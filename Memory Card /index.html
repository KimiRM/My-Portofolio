<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6</title>
    <link rel="stylesheet" href="main.css">
</head>
<body onload="SetUp()">
    <div id="Header">
        <h1>Memory Card</h1>
    </div>

    <div id="Board">

    </div>

    <div id="buttons">
        <button id="ShowAll">Show All Items</button>
        <button id="SaveNewItem">Save New Item</button>
        <button id="DeleteItem">Delete Item</button>
        <button id="HideItems">Hide Items</button>
    </div>

    <div id="SaveFormDiv">
        <Form id="SaveForm">
            <div id="SaveTitle">
                <h5>Title : </h5>
                <input placeholder="Type Here" type="text" id="SaveCardTitle">
            </div>
            
            <div id="SaveDescription">
                <h5>Description : </h5>
                <textarea placeholder="Type here" id="SaveCardDescription" rows="3" cols="40"></textarea>
            </div>
            <div id="SaveFormBtns">
                <button type="submit" id="SaveFormSubmit">Save</button>
                <button type="reset" id="SaveFormClose">Close</button>
            </div>
        </Form>
    </div>

    <div id="EditFormDiv">
        <Form id="EditForm">
            <div id="EditTitle">
                <h5>Title : </h5>
                <input type="text" id="EditCardTitle">
            </div>
            
            <div id="EditDescription">
                <h5>Description : </h5>
                <textarea id="EditCardDescription" rows="3" cols="40"></textarea>
            </div>
            <div id="EditFormBtns">
                <button type="submit" id="EditFormSubmit">Save</button>
                <button type="reset" id="EditFormClose">Close</button>
            </div>
        </Form>
    </div>
    <div id="ViewDiv">
        <div id="ViewTitle">
            <h5>Title : </h5>
            <h5 id="ViewCardTitle"></h5>
            </div>
            
        <div id="ViewDescription">
            <h5>Description : </h5>
            <p id="ViewCardDescription" rows="3" cols="40"></p>
        </div>
        <button id="ViewDivClose">Close</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
